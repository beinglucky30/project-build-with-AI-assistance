
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }

#explainer {
  width: 100%;
  background: #0d1117;
  border-radius: 16px;
  overflow: hidden;
  position: relative;
  min-height: 520px;
}

.screen {
  display: none;
  width: 100%;
  animation: fadeScene 0.5s ease forwards;
}
.screen.active { display: block; }

@keyframes fadeScene {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.progress-bar {
  display: flex;
  gap: 6px;
  padding: 14px 20px 0;
  align-items: center;
  justify-content: center;
  background: #0d1117;
}

.progress-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #2a2f3a;
  transition: all 0.3s;
  cursor: pointer;
}
.progress-dot.active { background: #00d4aa; transform: scale(1.35); box-shadow: 0 0 6px #00d4aa88; }
.progress-dot.done { background: #00d4aa66; }

.chapter-label {
  text-align: center;
  font-size: 11px;
  color: #4a5568;
  padding: 6px 0 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: #0d1117;
}

.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  background: #0d1117;
  border-top: 1px solid #1e2433;
}

.nav-btn {
  background: #1a2035;
  border: 1px solid #2a3450;
  color: #a0aec0;
  padding: 8px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font-sans);
  transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.nav-btn:hover { background: #222d45; color: #e2e8f0; }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-btn.primary { background: #00d4aa22; border-color: #00d4aa55; color: #00d4aa; }
.nav-btn.primary:hover { background: #00d4aa33; }

.scene-counter {
  font-size: 13px;
  color: #4a5568;
  font-family: var(--font-mono);
}

@keyframes pulse-ring {
  0% { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(2.2); opacity: 0; }
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes wave {
  0% { transform: translateX(0); }
  100% { transform: translateX(-40px); }
}
@keyframes bounce-alert {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
@keyframes flow-right {
  0% { stroke-dashoffset: 30; opacity: 0; }
  30% { opacity: 1; }
  100% { stroke-dashoffset: 0; opacity: 1; }
}
@keyframes pop-in {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes slide-up {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
@keyframes glow-pulse {
  0%,100% { filter: drop-shadow(0 0 4px #00d4aa); }
  50% { filter: drop-shadow(0 0 12px #00d4aa); }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes alarm-flash {
  0%,100% { background: transparent; }
  50% { background: rgba(239,68,68,0.08); }
}

.alarm-flash { animation: alarm-flash 0.6s ease-in-out infinite; }
</style>

<script>
const scenes = [
  { id:'s0', label:'Introduction',          chapter:'01 — Overview' },
  { id:'s1', label:'The Problem',           chapter:'02 — Why It\'s Needed' },
  { id:'s2', label:'Sensor Anatomy',        chapter:'03 — Hardware Layers' },
  { id:'s3', label:'IoT Architecture',      chapter:'04 — Data Flow' },
  { id:'s4', label:'Live Detection',        chapter:'05 — Alert in Action' },
  { id:'s5', label:'Smart Features',        chapter:'06 — Capabilities' },
  { id:'s6', label:'Use Cases & Stats',     chapter:'07 — Applications' },
];

let current = 0;

function buildProgress() {
  const bar = document.getElementById('prog-bar');
  bar.innerHTML = scenes.map((s, i) => `<div class="progress-dot${i===0?' active':''}" onclick="goScene(${i})" title="${s.label}"></div>`).join('');
}

function updateUI() {
  scenes.forEach((s,i) => {
    const el = document.getElementById(s.id);
    el.classList.toggle('active', i === current);
  });
  document.getElementById('chap-label').textContent = scenes[current].chapter;
  document.getElementById('scene-counter').textContent = `${current+1} / ${scenes.length}`;
  document.getElementById('prev-btn').disabled = current === 0;
  const nb = document.getElementById('next-btn');
  nb.textContent = current === scenes.length-1 ? '↺ Restart' : 'Next →';
  nb.className = 'nav-btn primary';

  document.querySelectorAll('.progress-dot').forEach((d,i) => {
    d.classList.toggle('active', i === current);
    d.classList.toggle('done', i < current);
  });
}

function goScene(n) {
  current = n;
  updateUI();
}

function nextScene() {
  if (current < scenes.length-1) { current++; updateUI(); }
  else { current = 0; updateUI(); }
}

function prevScene() {
  if (current > 0) { current--; updateUI(); }
}

buildProgress();
updateUI();
</script>
